<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image resolution test</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background:#eee; font-family:sans-serif; padding:20px; }
    .row { display:flex; gap:24px; flex-wrap:wrap; }
    .box { width:220px; }
    .box h3 { font-size:15px; margin:6px 0; color:#111; }
    .swatch { width:220px; height:160px; border:2px solid #333; background-size:cover; background-position:center; }
  </style>
</head>
<body>
  <h1 style="color:#111">Image technique test</h1>
  <div class="row">
    <div class="box">
      <div class="swatch dish__img" style="--img:url('images/tandoori.jpg')"></div>
      <h3>A) --img custom prop + external CSS var(--img)</h3>
    </div>
    <div class="box">
      <div class="swatch" style="background-image:url('images/tandoori.jpg')"></div>
      <h3>B) direct inline background-image</h3>
    </div>
    <div class="box">
      <img class="swatch" src="images/tandoori.jpg" alt="C" />
      <h3>C) &lt;img src&gt; tag</h3>
    </div>
    <div class="box">
      <div class="swatch" style="background-image:url('/images/tandoori.jpg')"></div>
      <h3>D) root-absolute /images/</h3>
    </div>
  </div>
</body>
</html>
